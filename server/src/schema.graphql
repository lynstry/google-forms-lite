enum QuestionType {
  TEXT
  MULTIPLE_CHOICE
  CHECKBOX
  DATE
}

type Form {
  id: ID!
  title: String!
  description: String
  questions: [Question!]!
  createdAt: String!
  updatedAt: String!
}

type Question {
  id: ID!
  text: String!
  type: QuestionType!
  options: [String!]
  required: Boolean!
  order: Int!
}

type Answer {
  questionId: ID!
  value: String!
}

type FormResponse {
  id: ID!
  formId: ID!
  answers: [Answer!]!
  submittedAt: String!
}

input QuestionInput {
  text: String!
  type: QuestionType!
  options: [String!]
  required: Boolean!
  order: Int!
}

input AnswerInput {
  questionId: ID!
  value: String!
}

input CreateFormInput {
  title: String!
  description: String
  questions: [QuestionInput!]!
}

input SubmitResponseInput {
  formId: ID!
  answers: [AnswerInput!]!
}

type Query {
  forms: [Form!]!
  form(id: ID!): Form
  responses(formId: ID!): [FormResponse!]!
}

type Mutation {
  createForm(input: CreateFormInput!): Form!
  submitResponse(input: SubmitResponseInput!): FormResponse!
}
